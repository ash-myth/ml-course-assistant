name: Eval
on: [push]
jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install deps
      run: pip install sentence-transformers faiss-cpu pandas numpy
    - name: Run eval
      env:
        LANGCHAIN_TRACING_V2: "false"
      run: python eval/eval.py
